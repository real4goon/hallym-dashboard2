    function initHospitalList() {
        const select = document.getElementById('hospitalSelect');
        if (!select) return;
        let optionsHtml = '';
        hospData.forEach(h => {
            optionsHtml += `<option value="${h.keyword}">${h.label}</option>`;
        });
        select.innerHTML = optionsHtml;
    }

    document.addEventListener("DOMContentLoaded", function() {
        initHospitalList();
    });

    async function fetchApiData() {
        const hospSearchKeyword = document.getElementById('hospitalSelect').value;
        const statusEl = document.getElementById('apiStatus');
        
        statusEl.innerText = "⏳ 데이터 환경에 따라 1분정도 소요됩니다...";
        statusEl.style.color = "blue";
        
        const targetUrl = `https://apis.data.go.kr/B551182/nonPaymentDamtInfoService/getNonPaymentItemHospDtlList?ServiceKey=${API_KEY}&pageNo=1&numOfRows=1000&yadmNm=${encodeURIComponent(hospSearchKeyword)}`;

        let xmlText = "";
        let fetchSuccess = false;

        const fetchStrategies = [
            async () => {
                const res = await fetch(targetUrl);
                if (!res.ok) throw new Error("Direct Failed");
                return await res.text();
            },
            async () => {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                if (!res.ok) throw new Error("Proxy 1 Failed");
                return await res.text();
            },
            async () => {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`);
                if (!res.ok) throw new Error("Proxy 2 Failed");
                return await res.text();
            }
        ];

        for (let strategy of fetchStrategies) {
            try {
                xmlText = await strategy();
                if (xmlText && !xmlText.includes("LIMITED") && !xmlText.includes("SERVICE_ERROR")) {
                    fetchSuccess = true;
                    break; 
                }
            } catch (e) {
                console.warn("경로 우회 중...");
            }
        }

        // ★ 통신 실패 및 0건 조회 시 동일한 강력한 안내 문구 표출
        if (!fetchSuccess) {
            statusEl.innerText = "❌ 0건으로 조회시 심평원 서버 오류이오니 잠시 후 다시 시도해주세요. (지속 시 [Allow CORS] 확장프로그램 사용 권장)";
            statusEl.style.color = "red";
            document.getElementById('treeContent').innerHTML = '데이터 통신 실패';
            renderTable([]);
            return;
        }

        try {
            const items = new DOMParser().parseFromString(xmlText, "text/xml").getElementsByTagName("item");

            if(items.length > 0) {
                apiData = Array.from(items).map(node => {
                    const getText = (tag) => node.getElementsByTagName(tag)[0]?.textContent || '';
                    let rawDate = getText("adtFrDd") || '-';
                    let formattedDate = rawDate.length === 8 ? `${rawDate.slice(0,4)}-${rawDate.slice(4,6)}-${rawDate.slice(6,8)}` : rawDate;
                    
                    return {
                        code: getText("npayCd") || getText("cd") || '-',
                        name: getText("npayKorNm") || getText("npayNm") || getText("npayCdNm") || '명칭 없음',
                        price: getText("curAmt") || getText("prcMin") || '0',
                        date: formattedDate
                    };
                });

                statusEl.innerText = `✅ 성공! 총 ${apiData.length.toLocaleString()}건 완료`;
                statusEl.style.color = "green";
                
                buildVirtualTree();
                renderTable(apiData); 
            } else {
                // 심평원이 에러 없이 0건을 돌려준 경우에도 확장 프로그램 안내 추가
                statusEl.innerText = "❌ 0건으로 조회시 심평원 서버 오류이오니 잠시 후 다시 시도해주세요. (지속 시 [Allow CORS] 확장프로그램 사용 권장)";
                statusEl.style.color = "red";
                document.getElementById('treeContent').innerHTML = '데이터가 없습니다.';
                renderTable([]);
            }
        } catch (error) {
            console.error(error);
            statusEl.innerText = "❌ 0건으로 조회시 심평원 서버 오류이오니 잠시 후 다시 시도해주세요. (지속 시 [Allow CORS] 확장프로그램 사용 권장)";
            statusEl.style.color = "red";
            document.getElementById('treeContent').innerHTML = '데이터 통신 실패';
            renderTable([]);
        }
    }

    function buildVirtualTree() {
        const tree = document.getElementById('treeContent');
        tree.innerHTML = '';
        const categories = {
            "초음파 검사료": [], "MRI (자기공명영상)": [], "로봇수술/처치": [], 
            "도수/체외충격파": [], "제증명/진단서": [], "기타/미분류 항목": []
        };

        apiData.forEach(d => {
            const name = d.name.toLowerCase();
            if(name.includes('초음파')) categories["초음파 검사료"].push(d);
            else if(name.includes('mri') || name.includes('자기공명')) categories["MRI (자기공명영상)"].push(d);
            else if(name.includes('로봇')) categories["로봇수술/처치"].push(d);
            else if(name.includes('도수') || name.includes('체외충격')) categories["도수/체외충격파"].push(d);
            else if(name.includes('증명') || name.includes('진단서') || name.includes('확인서')) categories["제증명/진단서"].push(d);
            else categories["기타/미분류 항목"].push(d);
        });

        for(let key in categories) {
            const count = categories[key].length;
            if(count === 0) continue;

            const div = document.createElement('div');
            div.className = 'category-item';
            div.innerHTML = `📁 ${key} <span style="color:#d9534f; font-size:12px;">(${count}건)</span>`;
            
            const subDiv = document.createElement('div');
            subDiv.className = 'sub-category';
            
            const displayLimit = Math.min(count, 40);
            for(let i=0; i<displayLimit; i++) {
                const item = categories[key][i];
                const sItem = document.createElement('div');
                sItem.className = 'sub-item';
                sItem.innerHTML = `└ ${item.name}`;
                sItem.onclick = (e) => { e.stopPropagation(); renderTable([item]); };
                subDiv.appendChild(sItem);
            }
            if(count > 40) {
                const moreItem = document.createElement('div');
                moreItem.className = 'sub-item';
                moreItem.style.color = '#888';
                moreItem.style.borderBottom = 'none';
                moreItem.innerHTML = `└ ...외 ${count - 40}건 (폴더 클릭 시 전체표시)`;
                subDiv.appendChild(moreItem);
            }

            div.onclick = () => {
                subDiv.style.display = subDiv.style.display === 'none' || subDiv.style.display === '' ? 'block' : 'none';
                renderTable(categories[key]); 
            };
            div.appendChild(subDiv);
            tree.appendChild(div);
        }
    }

    function searchData() {
        const kw = document.getElementById('searchInput').value.toLowerCase().trim();
        if(!kw) { renderTable(apiData); return; }
        const filtered = apiData.filter(d => { return `${d.code} ${d.name}`.toLowerCase().includes(kw); });
        renderTable(filtered); 
    }

    function renderTable(data) {
        currentViewData = data; 
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        if(!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">검색 결과가 없습니다.</td></tr>';
            return;
        }
        data.forEach((d) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${d.code}</td>
                <td style="text-align:left; font-weight:bold; color:#004b87;">${d.name}</td>
                <td class="price">${Number(d.price).toLocaleString()}원</td>
                <td class="date-col">${d.date}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function exportToExcel() {
        if (!currentViewData || currentViewData.length === 0) { alert("엑셀로 다운로드할 데이터가 없습니다."); return; }
        const excelData = currentViewData.map(d => ({
            "코드(EDI)": d.code, "비급여 항목명": d.name, "제출 비용(단가)": Number(d.price), "최종 등록일자": d.date
        }));
        const ws = XLSX.utils.json_to_sheet(excelData);
        ws['!cols'] = [ {wch: 15}, {wch: 60}, {wch: 15}, {wch: 15} ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "비급여단가_조회내역");
        
        const selectEl = document.getElementById('hospitalSelect');
        const hospLabel = selectEl.options[selectEl.selectedIndex].text;
        
        const today = new Date();
        const dateStr = today.getFullYear() + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
        XLSX.writeFile(wb, `[${hospLabel}]비급여단가조회_${dateStr}.xlsx`);
    }
    document.getElementById('searchInput').onkeypress = e => { if(e.key==='Enter') searchData(); };
</script>
</body>
</html>
